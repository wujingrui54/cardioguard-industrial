<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 · CardioGuard Industrial</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%23EF4444'/%3E%3Cstop offset='1' stop-color='%23F59E0B'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='14' fill='url(%23g)'/%3E%3Cpath d='M8 32h10l5-12 10 24 5-12h18' stroke='white' stroke-width='4.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E" />
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      min-height:100vh;
      background:radial-gradient(1000px 600px at 30% 0%,rgba(239,68,68,.2),transparent 60%),
                 linear-gradient(180deg,#0B1120,#0F172A);
      color:#F1F5F9;
      font-family:'Noto Sans SC','Noto Sans KR','Inter',system-ui,sans-serif;
      display:grid;place-items:center;padding:32px;
    }
    .card{
      max-width:560px;text-align:center;
    }
    .code{
      font-size:clamp(72px,14vw,144px);font-weight:900;line-height:1;letter-spacing:-2px;
      background:linear-gradient(135deg,#EF4444 0%,#F59E0B 100%);
      -webkit-background-clip:text;background-clip:text;color:transparent;
    }
    h1{font-size:24px;margin:18px 0 12px}
    p{color:#94A3B8;line-height:1.7;margin-bottom:28px}
    a.btn{
      display:inline-block;padding:13px 26px;border-radius:999px;
      background:linear-gradient(135deg,#EF4444,#F59E0B);color:#fff;
      font-weight:700;text-decoration:none;
      box-shadow:0 10px 24px rgba(239,68,68,.35);
      transition:transform .2s ease;
    }
    a.btn:hover{transform:translateY(-2px)}
    .pulse{
      width:80px;height:80px;border-radius:50%;
      background:rgba(239,68,68,.15);border:2px solid rgba(239,68,68,.4);
      margin:0 auto 28px;display:grid;place-items:center;
      animation:beat 1.4s ease-in-out infinite;
    }
    @keyframes beat{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
    .pulse svg{width:42px;height:42px;color:#EF4444}
  </style>
</head>
<body>
  <div class="card">
    <div class="pulse" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12h4l2-5 4 10 2-5h6"/>
      </svg>
    </div>
    <div class="code">404</div>
    <h1>页面未找到 · 페이지를 찾을 수 없습니다 · Page Not Found</h1>
    <p>请求的资源已不存在或被移动。<br/>요청하신 페이지를 찾을 수 없습니다.<br/>The page you are looking for could not be found.</p>
    <a class="btn" href="/">返回首页 · 홈으로 · Go Home</a>
  </div>
</body>
</html>
